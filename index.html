<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NameNest</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    h1 {
      margin-top: 40px;
      font-size: 40px;
    }

    .container {
      margin-top: 30px;
      width: 90%;
      max-width: 500px;
      text-align: center;
    }

    button {
      padding: 10px 15px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }

    .name {
      background: #1e293b;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>

<body>

  <h1>NameNest</h1>
  <p>Generate your perfect name instantly</p>

  <div class="container">
    <button onclick="generateNames()">Generate Gamer Tags 🎮</button>
    <div id="results"></div>
  </div>

  <script>
    const prefixes = ["Xeno", "Dark", "Neo", "Ultra", "Cyber", "Void", "Storm", "Shadow"];
    const suffixes = ["Blade", "Wolf", "Sniper", "Hunter", "Nova", "Fury", "Ghost", "Strike"];

    function randomName() {
      const p = prefixes[Math.floor(Math.random() * prefixes.length)];
      const s = suffixes[Math.floor(Math.random() * suffixes.length)];
      return p + s + Math.floor(Math.random() * 99);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
      alert("Copied: " + text);
    }

    function generateNames() {
      const results = document.getElementById("results");
      results.innerHTML = "";

      for (let i = 0; i < 10; i++) {
        const name = randomName();

        const div = document.createElement("div");
        div.className = "name";
        div.innerHTML = `
          <span>${name}</span>
          <button onclick="copyText('${name}')">Copy</button>
        `;

        results.appendChild(div);
      }
    }
  </script>

</body>
</html>
