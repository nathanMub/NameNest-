<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NameNest | AI Name Generator</title>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
}

body {
  background: radial-gradient(circle at top, #0b1220, #111827);
  color: #f8fafc;
  overflow-x:hidden;
}

/* NAV */
.navbar {
  width:100%;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;
  top:0;
}

.logo { font-weight:700; }

.links a {
  color:rgba(255,255,255,0.7);
  text-decoration:none;
  margin-left:14px;
  font-size:14px;
}

.links a:hover { color:white; }

/* HERO */
.hero {
  text-align:center;
  margin-top:70px;
  animation: fadeIn 0.8s ease;
}

.hero h1 {
  font-size:52px;
  letter-spacing:-1px;
}

.hero p {
  margin-top:10px;
  opacity:0.65;
}

/* SEARCH */
.search-box {
  margin:30px auto 10px;
  width:92%;
  max-width:520px;
  display:flex;
  gap:10px;
}

.search-box input {
  flex:1;
  padding:14px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  color:white;
  outline:none;
}

.search-box button {
  padding:14px 16px;
  border:none;
  border-radius:14px;
  cursor:pointer;
  font-weight:600;
  background:linear-gradient(135deg,#38bdf8,#8b5cf6);
  color:#0b0f19;
  transition:0.2s ease;
}

.search-box button:hover {
  transform:scale(1.05);
}

/* AI BUTTON */
.ai-btn {
  display:block;
  margin:0 auto 25px;
  padding:10px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
}

/* RESULTS */
.result-box {
  margin:20px auto;
  width:92%;
  max-width:520px;
  display:none;
  animation: fadeIn 0.4s ease;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 14px;
  margin-top:10px;
  border-radius:14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  animation: pop 0.3s ease;
}

.copy {
  padding:6px 10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:rgba(34,197,94,0.15);
  color:#22c55e;
}

/* GRID */
.grid {
  margin:40px auto;
  width:92%;
  max-width:900px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
}

.card {
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  text-decoration:none;
  color:white;
  transition:0.25s ease;
}

.card:hover {
  transform:translateY(-6px);
  background:rgba(255,255,255,0.06);
}

.footer {
  text-align:center;
  margin:60px 0;
  opacity:0.5;
  font-size:13px;
}

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity:0; }
  to { opacity:1; }
}

@keyframes pop {
  from { transform:scale(0.95); opacity:0; }
  to { transform:scale(1); opacity:1; }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">NameNest</div>
  <div class="links">
    <a href="gaming.html">Gaming</a>
    <a href="anime.html">Anime</a>
    <a href="business.html">Business</a>
    <a href="cute.html">Cute</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>AI Name Generator</h1>
  <p>Type anything and get smart name ideas instantly</p>
</div>

<!-- SEARCH -->
<div class="search-box">
  <input id="input" type="text" placeholder="Try: anime, gaming, brand, cute..." />
  <button onclick="generateSmart()">Generate</button>
</div>

<button class="ai-btn" id="aiBtn" onclick="toggleAI()">AI Mode: OFF</button>

<!-- RESULTS -->
<div id="results" class="result-box"></div>

<!-- GRID -->
<div class="grid">

  <a class="card" href="gaming.html">🎮 Gaming Names</a>
  <a class="card" href="anime.html">⚡ Anime Names</a>
  <a class="card" href="business.html">💼 Business Names</a>
  <a class="card" href="cute.html">🌸 Cute Names</a>

</div>

<div class="footer">
  NameNest — smart AI-style name generator
</div>

<script>

let aiMode = false;

function toggleAI(){
  aiMode = !aiMode;
  document.getElementById("aiBtn").innerText =
    "AI Mode: " + (aiMode ? "ON ✨" : "OFF");
}

function copy(t){
  navigator.clipboard.writeText(t);
}

/* SMART + AI GENERATOR */
function generateSmart(){
  const input = document.getElementById("input").value.toLowerCase();
  const box = document.getElementById("results");

  box.style.display = "block";
  box.innerHTML = "";

  let p=[], s=[];

  if(input.includes("anime")){
    p=["Akira","Rin","Sora","Kuro","Yuki","Kai","Ren"];
    s=["Senpai","Kage","Soul","Blade","Storm","Zero"];
  }
  else if(input.includes("business") || input.includes("brand")){
    p=["Nova","Prime","Urban","Echo","Core","Zen"];
    s=["Labs","Studios","Works","Co","Group","Media"];
  }
  else if(input.includes("cute") || input.includes("aesthetic")){
    p=["Mochi","Bunny","Fluffy","Honey","Cherry","Lily"];
    s=["Pop","Boo","Luv","Bean","Spark","Pie"];
  }
  else {
    p=["Xeno","Dark","Neo","Cyber","Void","Storm","Pixel"];
    s=["Blade","Wolf","Sniper","Hunter","Nova","Ghost"];
  }

  function smartPick(arr){
    return arr[Math.floor(Math.random()*arr.length)];
  }

  function boost(name){
    if(aiMode && Math.random() > 0.6){
      const extras=["X","Z","V","Ω"];
      name += extras[Math.floor(Math.random()*extras.length)];
    }
    return name;
  }

  function build(){
    let name;

    if(aiMode){
      const styles=[
        ()=> smartPick(p)+smartPick(s),
        ()=> smartPick(p)+" "+smartPick(s),
        ()=> smartPick(p)+smartPick(s)+Math.floor(Math.random()*9)
      ];
      name = styles[Math.floor(Math.random()*styles.length)]();
    } else {
      name = smartPick(p)+smartPick(s)+Math.floor(Math.random()*99);
    }

    return boost(name);
  }

  for(let i=0;i<10;i++){
    const name = build();

    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <span>${name}</span>
      <button class="copy" onclick="copy('${name}')">Copy</button>
    `;

    box.appendChild(div);
  }
}

document.getElementById("input").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") generateSmart();
});

</script>

</body>
</html>
