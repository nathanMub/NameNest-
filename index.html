<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NameNest</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
    }

    .hero {
      text-align: center;
      margin-top: 70px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 1px;
    }

    p {
      opacity: 0.7;
      margin-top: 10px;
    }

    .card {
      margin-top: 40px;
      width: 90%;
      max-width: 520px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
      transition: transform 0.15s ease;
    }

    button:hover {
      transform: scale(1.03);
    }

    .name {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin-top: 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .copy {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <div class="hero">
    <h1>NameNest</h1>
    <p>Generate names that actually feel premium</p>
  </div>

  <div class="card">
    <button onclick="generateNames()">Generate Gamer Tags 🎮</button>
    <div id="results"></div>
  </div>

  <script>
    const prefixes = ["Xeno","Dark","Neo","Ultra","Cyber","Void","Storm","Shadow","Pixel","Lunar"];
    const suffixes = ["Blade","Wolf","Sniper","Hunter","Nova","Fury","Ghost","Strike","Phantom","Drift"];

    function randomName() {
      const p = prefixes[Math.floor(Math.random()*prefixes.length)];
      const s = suffixes[Math.floor(Math.random()*suffixes.length)];
      return p + s + Math.floor(Math.random()*99);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
    }

    function generateNames() {
      const results = document.getElementById("results");
      results.innerHTML = "";

      for (let i = 0; i < 10; i++) {
        const name = randomName();

        const div = document.createElement("div");
        div.className = "name";
        div.innerHTML = `
          <span>${name}</span>
          <button class="copy" onclick="copyText('${name}')">Copy</button>
        `;

        results.appendChild(div);
      }
    }
  </script>

</body>
</html>
