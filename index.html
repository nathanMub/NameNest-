<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NameNest</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      text-align: center;
      margin-top: 60px;
      padding: 0 20px;
    }

    h1 {
      font-size: 48px;
    }

    p {
      opacity: 0.7;
      margin-top: 8px;
    }

    .card {
      margin-top: 35px;
      width: 90%;
      max-width: 520px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 18px;
    }

    .generate-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      color: black;
      transition: 0.15s ease;
      margin-bottom: 15px;
    }

    .generate-btn:hover {
      transform: scale(1.02);
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .name {
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .copy-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: rgba(34,197,94,0.2);
      color: #22c55e;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.15s ease;
    }

    .copy-btn:hover {
      background: rgba(34,197,94,0.35);
    }

  </style>
</head>

<body>

  <div class="hero">
    <h1>NameNest</h1>
    <p>Generate names instantly</p>
  </div>

  <div class="card">
    <button class="generate-btn" onclick="generateNames()">
      Generate Gamer Tags 🎮
    </button>

    <div id="results" class="list"></div>
  </div>

  <script>
    const prefixes = ["Xeno","Dark","Neo","Ultra","Cyber","Void","Storm","Shadow","Pixel","Lunar"];
    const suffixes = ["Blade","Wolf","Sniper","Hunter","Nova","Fury","Ghost","Strike","Phantom","Drift"];

    function randomName() {
      const p = prefixes[Math.floor(Math.random() * prefixes.length)];
      const s = suffixes[Math.floor(Math.random() * suffixes.length)];
      return p + s + Math.floor(Math.random() * 99);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text);
    }

    function generateNames() {
      const results = document.getElementById("results");
      results.innerHTML = "";

      for (let i = 0; i < 10; i++) {
        const name = randomName();

        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
          <span class="name">${name}</span>
          <button class="copy-btn" onclick="copyText('${name}')">⧉</button>
        `;

        results.appendChild(div);
      }
    }
  </script>

</body>
</html>
