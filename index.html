<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gaming Name Generator | NameNest</title>

<style>
body {
  margin:0;
  font-family:system-ui;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color:white;
}

/* NAV */
.navbar {
  width:100%;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

.links a {
  color:rgba(255,255,255,0.75);
  text-decoration:none;
  margin-left:12px;
  font-size:14px;
}

/* HERO */
.hero { text-align:center; margin-top:30px; }
.hero h1 { font-size:42px; }
.hero p { opacity:0.7; }

/* CARD */
.card {
  margin:30px auto;
  width:90%;
  max-width:520px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,0.06);
}

.btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  font-weight:bold;
  background:linear-gradient(135deg,#38bdf8,#a78bfa);
  color:black;
  margin-bottom:15px;
  cursor:pointer;
}

.item {
  display:flex;
  justify-content:space-between;
  padding:12px;
  margin-top:10px;
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}

.copy {
  background:#22c55e;
  border:none;
  border-radius:8px;
  padding:6px 10px;
  cursor:pointer;
  font-weight:bold;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="logo">NameNest</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="anime.html">Anime</a>
    <a href="business.html">Business</a>
    <a href="cute.html">Cute</a>
  </div>
</nav>

<div class="hero">
<h1>Gaming Names</h1>
<p>Create epic gamer tags</p>
</div>

<div class="card">
<button class="btn" onclick="generate()">Generate</button>
<div id="list"></div>
</div>

<script>
const p=["Xeno","Dark","Neo","Cyber","Void","Storm","Shadow","Pixel"];
const s=["Blade","Wolf","Sniper","Hunter","Nova","Ghost","Strike","Drift"];

function random(){
  return p[Math.floor(Math.random()*p.length)] +
         s[Math.floor(Math.random()*s.length)] +
         Math.floor(Math.random()*99);
}

function copy(t){ navigator.clipboard.writeText(t); }

function generate(){
  const list=document.getElementById("list");
  list.innerHTML="";
  for(let i=0;i<10;i++){
    const name=random();
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`<span>${name}</span>
    <button class="copy" onclick="copy('${name}')">Copy</button>`;
    list.appendChild(div);
  }
}

generate();
</script>

</body>
</html>
