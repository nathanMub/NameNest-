<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Gaming Name Generator (Gamer Tags Ideas) | NameNest</title>
  <meta name="description" content="Generate cool gaming usernames and gamer tags instantly. Find unique Xbox, Fortnite, Roblox and Discord names with NameNest." />
  <meta name="keywords" content="gaming names, gamer tags, username generator, roblox names, fortnite names, discord names" />

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      text-align: center;
      margin-top: 60px;
      padding: 0 15px;
    }

    h1 {
      font-size: 42px;
    }

    p {
      opacity: 0.7;
    }

    .card {
      margin-top: 30px;
      width: 90%;
      max-width: 520px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(12px);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 15px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      margin-top: 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }

    .copy {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .links {
      margin-top: 25px;
      text-align: center;
    }

    a {
      color: #38bdf8;
      text-decoration: none;
      display: block;
      margin-top: 8px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>Gaming Name Generator</h1>
    <p>Create unique gamer tags for Roblox, Fortnite, Xbox & more</p>
  </div>

  <div class="card">

    <button class="btn" onclick="generate()">Generate Names 🎮</button>

    <div id="list"></div>

    <div class="links">
      <a href="index.html">← Back to NameNest</a>
      <a href="anime.html">Anime Names →</a>
      <a href="business.html">Business Names →</a>
    </div>

  </div>

  <script>
    const p = ["Xeno","Dark","Neo","Cyber","Void","Storm","Shadow","Pixel"];
    const s = ["Blade","Wolf","Sniper","Hunter","Nova","Ghost","Strike","Drift"];

    function randomName() {
      return p[Math.floor(Math.random()*p.length)] +
             s[Math.floor(Math.random()*s.length)] +
             Math.floor(Math.random()*99);
    }

    function copy(t) {
      navigator.clipboard.writeText(t);
    }

    function generate() {
      const list = document.getElementById("list");
      list.innerHTML = "";

      for (let i = 0; i < 10; i++) {
        const name = randomName();

        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
          <span>${name}</span>
          <button class="copy" onclick="copy('${name}')">Copy</button>
        `;

        list.appendChild(div);
      }
    }

    generate();
  </script>

</body>
</html>
